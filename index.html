<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>蛋白质等电点 · 离子全动态解离模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,700;14..32,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --panel-bg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border-color: #e2e8f0;
      --color-positive: #FF3B30;
      --color-negative: #000000;
      --color-zwitter: #34C759;
      --color-hydroxide: #007AFF;
      --color-core: #1e293b;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background-color: #e9eef3;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    #control-panel {
      width: 380px;
      background-color: var(--panel-bg);
      border-right: 1px solid #cbd5e1;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      z-index: 20;
      background: rgba(255, 255, 255, 0.95);
      overflow-y: auto;
    }
    .brand h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .brand .subtitle {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-left: 4px solid var(--color-zwitter);
      padding-left: 10px;
      margin-bottom: 24px;
    }
    .section {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
    }
    .section:last-of-type {
      border-bottom: none;
      padding-bottom: 0;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .slider-card {
      background: #f8fafc;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      margin-bottom: 14px;
    }
    .slider-header {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      accent-color: var(--text-primary);
    }
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      padding: 11px 8px;
      border: 1.5px solid #cbd5e1;
      background: white;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-primary);
    }
    button:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    button.active {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }
    .monitor-card {
      background: #0f172a;
      color: #fff;
      padding: 18px 16px;
      border-radius: 14px;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid #1e293b;
    }
    .monitor-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
      border-bottom: 1px dashed #334155;
      padding-bottom: 7px;
    }
    .monitor-line:last-child {
      margin-bottom: 0;
      border: none;
    }
    #stage-container {
      flex-grow: 1;
      position: relative;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #anode-line,
    #cathode-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 12px;
      z-index: 10;
    }
    #anode-line {
      left: 0;
      background: linear-gradient(to right, #FF3B30, #ff6b5e);
      box-shadow: 4px 0 12px rgba(255, 59, 48, 0.4);
    }
    #cathode-line {
      right: 0;
      background: linear-gradient(to left, #000, #1e1e1e);
      box-shadow: -4px 0 12px rgba(0, 0, 0, 0.5);
    }
    .pole-label {
      position: absolute;
      top: 24px;
      font-weight: 800;
      font-size: 13px;
      z-index: 15;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px 14px;
      border-radius: 30px;
      border: 2px solid;
    }
  </style>
</head>
<body>
  <div id="control-panel">
    <div>
      <div class="brand">
        <h1>🧬 蛋白质等电点</h1>
        <div class="subtitle">PROTEIN pI · 离子迁移可视化</div>
      </div>
      <div class="section">
        <div class="section-title">⚡ 参数调控</div>
        <div class="slider-card">
          <div class="slider-header"><span>🌡️ 环境 pH</span><span id="ph-display" style="font-size:20px;">7.0</span></div>
          <input type="range" id="ph-slider" min="1.0" max="14.0" step="0.1" value="7.0">
        </div>
        <div class="slider-card" style="border-color:#34C759;">
          <div class="slider-header"><span style="color:#16a34a;">🧪 蛋白质 pI</span><span id="pi-display" style="font-size:20px; color:#34C759;">6.0</span></div>
          <input type="range" id="pi-slider" min="1.0" max="14.0" step="0.1" value="6.0">
        </div>
      </div>
      <div class="section">
        <div class="section-title">🔬 观察尺度</div>
        <div class="btn-group">
          <button id="btn-single" class="active">🧪 单一分子</button>
          <button id="btn-multi">🧬 多分子群</button>
        </div>
      </div>
      <div class="section">
        <div class="section-title">🌍 物理环境</div>
        <div class="btn-group">
          <button id="btn-lab" class="active">⚡ 电泳槽</button>
          <button id="btn-bio">💧 生物体内</button>
        </div>
      </div>
    </div>
    <div>
      <div class="section-title" style="margin-bottom:10px;">📊 实时监控</div>
      <div class="monitor-card">
        <div class="monitor-line"><span>🔵🔴 环境离子</span><span id="data-env">—</span></div>
        <div class="monitor-line"><span>⚡ 分子净电荷</span><span id="data-charge" style="font-size:18px;">0</span></div>
        <div class="monitor-line"><span>🧬 解离状态</span><span id="data-state">—</span></div>
        <div class="monitor-line"><span>🏊 泳动方向</span><span id="data-solubility">—</span></div>
      </div>
    </div>
  </div>

  <div id="stage-container">
    <div id="anode-line"></div>
    <div id="cathode-line"></div>
    <div class="pole-label" style="left:20px; color:#FF3B30;">[ + ] 正极</div>
    <div class="pole-label" style="right:20px; color:#000;">[ − ] 负极</div>
    <canvas id="simCanvas"></canvas>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('simCanvas');
      const ctx = canvas.getContext('2d');
      const phSlider = document.getElementById('ph-slider');
      const phDisplay = document.getElementById('ph-display');
      const piSlider = document.getElementById('pi-slider');
      const piDisplay = document.getElementById('pi-display');
      const dataEnv = document.getElementById('data-env');
      const dataCharge = document.getElementById('data-charge');
      const dataState = document.getElementById('data-state');
      const dataSolubility = document.getElementById('data-solubility');

      const COLOR_RED = '#FF3B30';
      const COLOR_BLK = '#000000';
      const COLOR_GRN = '#34C759';
      const COLOR_BLU = '#007AFF';
      const COLOR_CORE = '#1e293b';

      let isMulti = false;
      let isLab = true;
      let molecules = [];
      let hIons = [];
      let ohIons = [];
      let animationId;
      let lastTimestamp = 0;

      function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        initSystem();
      }

      function initSystem() {
        molecules = [];
        hIons = [];
        ohIons = [];
        const count = isMulti ? 55 : 1;
        for (let i = 0; i < count; i++) {
          molecules.push({
            x: isMulti ? Math.random() * (canvas.width - 160) + 80 : canvas.width / 2,
            y: isMulti ? Math.random() * (canvas.height - 200) + 80 : canvas.height / 2,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            radius: isMulti ? 16 : 68,
          });
        }
        updateEnvironmentIons();
      }

      function updateEnvironmentIons() {
        const ph = parseFloat(phSlider.value);
        const maxIons = 80;
        const targetH = Math.max(0, Math.floor(((14 - ph) / 13) * maxIons));
        const targetOH = Math.max(0, Math.floor(((ph - 1) / 13) * maxIons));

        const now = performance.now();
        while (hIons.length < targetH) {
          hIons.push({
            x: 40 + Math.random() * (canvas.width - 80),
            y: Math.random() * canvas.height,
            vx: 0.6 + Math.random() * 0.5,
            vy: (Math.random() - 0.5) * 0.3,
            state: 'moving',
            arriveTime: 0,
          });
        }
        if (hIons.length > targetH) hIons.length = targetH;

        while (ohIons.length < targetOH) {
          ohIons.push({
            x: 40 + Math.random() * (canvas.width - 80),
            y: Math.random() * canvas.height,
            vx: -0.6 - Math.random() * 0.5,
            vy: (Math.random() - 0.5) * 0.3,
            state: 'moving',
            arriveTime: 0,
          });
        }
        if (ohIons.length > targetOH) ohIons.length = targetOH;
      }

      function drawFunctionalGroup(x, y, bg, text, stroke) {
        ctx.beginPath();
        ctx.arc(x, y, 26, 0, Math.PI * 2);
        ctx.fillStyle = bg;
        ctx.fill();
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 3.5;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, x, y);
      }

      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const dt = Math.min(50, timestamp - lastTimestamp);
        lastTimestamp = timestamp;

        updateEnvironmentIons();
        const ph = parseFloat(phSlider.value);
        const pI = parseFloat(piSlider.value);
        const diff = ph - pI;
        const isAtPI = Math.abs(diff) <= 0.3;
        const isCationic = diff < -0.3;
        const isAnionic = diff > 0.3;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < canvas.width; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, canvas.height);
          ctx.strokeStyle = '#e9eef3';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        document.getElementById('anode-line').style.display = isLab ? 'block' : 'none';
        document.getElementById('cathode-line').style.display = isLab ? 'block' : 'none';
        document.querySelectorAll('.pole-label').forEach(el => el.style.display = isLab ? 'block' : 'none');

        const leftEdge = 18;
        const rightEdge = canvas.width - 18;
        const stayDuration = 1200;

        // ========== 离子运动 ==========
        if (isLab) {
          // ---- 电场模式 ----
          // H⁺ (红) → 向负极(右)移动
          for (let i = hIons.length - 1; i >= 0; i--) {
            const p = hIons[i];
            if (p.state === 'moving') {
              p.vx += 0.025;
              if (p.vx > 2.0) p.vx = 2.0;
              p.x += p.vx;
              p.y += p.vy;
              if (p.y < 8) { p.y = 8;
                p.vy *= -0.4; }
              if (p.y > canvas.height - 8) { p.y = canvas.height - 8;
                p.vy *= -0.4; }
              if (p.x >= rightEdge) {
                p.x = rightEdge;
                p.state = 'arrived';
                p.arriveTime = timestamp;
                p.vx = 0;
                p.vy = 0;
              }
            } else if (p.state === 'arrived') {
              if (timestamp - p.arriveTime >= stayDuration) {
                p.x = 40 + Math.random() * (canvas.width - 80);
                p.y = 20 + Math.random() * (canvas.height - 40);
                p.vx = 0.6 + Math.random() * 0.5;
                p.vy = (Math.random() - 0.5) * 0.3;
                p.state = 'moving';
              }
            }
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_RED;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }

          // OH⁻ (蓝) → 向正极(左)移动
          for (let i = ohIons.length - 1; i >= 0; i--) {
            const p = ohIons[i];
            if (p.state === 'moving') {
              p.vx -= 0.025;
              if (p.vx < -2.0) p.vx = -2.0;
              p.x += p.vx;
              p.y += p.vy;
              if (p.y < 8) { p.y = 8;
                p.vy *= -0.4; }
              if (p.y > canvas.height - 8) { p.y = canvas.height - 8;
                p.vy *= -0.4; }
              if (p.x <= leftEdge) {
                p.x = leftEdge;
                p.state = 'arrived';
                p.arriveTime = timestamp;
                p.vx = 0;
                p.vy = 0;
              }
            } else if (p.state === 'arrived') {
              if (timestamp - p.arriveTime >= stayDuration) {
                p.x = 40 + Math.random() * (canvas.width - 80);
                p.y = 20 + Math.random() * (canvas.height - 40);
                p.vx = -0.6 - Math.random() * 0.5;
                p.vy = (Math.random() - 0.5) * 0.3;
                p.state = 'moving';
              }
            }
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_BLU;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
        } else {
          // ---- 生物体内模式：纯随机布朗运动 ----
          for (let p of hIons) {
            p.vx += (Math.random() - 0.5) * 0.7;
            p.vy += (Math.random() - 0.5) * 0.7;
            const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (spd > 2.0) { p.vx *= 2.0 / spd;
              p.vy *= 2.0 / spd; }
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < leftEdge) { p.x = leftEdge;
              p.vx *= -0.9; }
            if (p.x > rightEdge) { p.x = rightEdge;
              p.vx *= -0.9; }
            if (p.y < 10) { p.y = 10;
              p.vy *= -0.9; }
            if (p.y > canvas.height - 10) { p.y = canvas.height - 10;
              p.vy *= -0.9; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_RED;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
          for (let p of ohIons) {
            p.vx += (Math.random() - 0.5) * 0.7;
            p.vy += (Math.random() - 0.5) * 0.7;
            const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (spd > 2.0) { p.vx *= 2.0 / spd;
              p.vy *= 2.0 / spd; }
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < leftEdge) { p.x = leftEdge;
              p.vx *= -0.9; }
            if (p.x > rightEdge) { p.x = rightEdge;
              p.vx *= -0.9; }
            if (p.y < 10) { p.y = 10;
              p.vy *= -0.9; }
            if (p.y > canvas.height - 10) { p.y = canvas.height - 10;
              p.vy *= -0.9; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_BLU;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
        }

        // ========== 蛋白质分子 ==========
        let netChargeLabel = '±';
        let netChargeValue = '0.0';
        if (isCationic) { netChargeLabel = '+';
          netChargeValue = '+' + Math.abs(diff).toFixed(1); } else if (isAnionic) { netChargeLabel = '−';
          netChargeValue = '−' + Math.abs(diff).toFixed(1); }

        for (let m of molecules) {
          if (!isLab || isAtPI) {
            m.vx += (Math.random() - 0.5) * 0.3;
            m.vy += (Math.random() - 0.5) * 0.3;
          }
          if (isLab) {
            if (isCationic) m.vx += 0.28;
            if (isAnionic) m.vx -= 0.28;
          }
          if (isMulti && isAtPI) {
            for (let other of molecules) {
              if (other === m) continue;
              let dx = other.x - m.x,
                dy = other.y - m.y;
              let dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 80 && dist > 15) {
                m.vx += (dx / dist) * 0.15;
                m.vy += (dy / dist) * 0.15;
              }
            }
            m.vy += 0.25;
          }
          m.vx *= 0.9;
          m.vy *= 0.9;
          m.x += m.vx;
          m.y += m.vy;
          let edge = m.radius + 20;
          m.x = Math.max(edge, Math.min(canvas.width - edge, m.x));
          m.y = Math.max(m.radius + 10, Math.min(canvas.height - m.radius - 10, m.y));

          if (!isMulti) {
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_CORE;
            ctx.fill();
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 5;
            ctx.stroke();
            if (isCationic) drawFunctionalGroup(m.x - 75, m.y, COLOR_RED, '—NH₃⁺', '#000');
            else if (isAtPI) {
              drawFunctionalGroup(m.x - 75, m.y, COLOR_RED, '—NH₃⁺', '#000');
              drawFunctionalGroup(m.x + 75, m.y, COLOR_BLK, '—COO⁻', '#fff');
            } else if (isAnionic) drawFunctionalGroup(m.x + 75, m.y, COLOR_BLK, '—COO⁻', '#fff');
            ctx.fillStyle = isAtPI ? COLOR_GRN : '#fff';
            ctx.font = 'bold 38px "Inter"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(netChargeLabel, m.x, m.y);
            ctx.fillStyle = '#0f172a';
            ctx.font = '500 14px "Inter"';
            ctx.fillText('蛋白质', m.x, m.y - 55);
          } else {
            let mColor = COLOR_GRN;
            if (isCationic) mColor = COLOR_RED;
            if (isAnionic) mColor = COLOR_BLK;
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
            ctx.fillStyle = mColor;
            ctx.fill();
            ctx.strokeStyle = isAnionic ? '#fff' : '#0f172a';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px "Inter"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(netChargeLabel, m.x, m.y);
          }
        }

        // 监控面板
        phDisplay.innerText = ph.toFixed(1);
        piDisplay.innerText = pI.toFixed(1);
        dataCharge.innerText = netChargeValue;
        if (ph < 6.8) dataEnv.innerHTML = '<span style="color:#FF3B30;">H⁺ (红) 多于 OH⁻ (蓝)</span>';
        else if (ph > 7.2) dataEnv.innerHTML = '<span style="color:#007AFF;">OH⁻ (蓝) 多于 H⁺ (红)</span>';
        else dataEnv.innerHTML = '<span style="color:#94a3b8;">H⁺ 与 OH⁻ 平衡</span>';

        if (isAtPI) {
          dataCharge.style.color = COLOR_GRN;
          dataState.innerHTML =
            '<span style="background:#34C759;color:#fff;padding:2px 8px;border-radius:20px;">兼性离子</span>';
          dataSolubility.innerText = isLab ? '⏸️ 静止' : '🌊 布朗扩散';
          dataSolubility.style.color = COLOR_GRN;
        } else if (isCationic) {
          dataCharge.style.color = COLOR_RED;
          dataState.innerHTML =
            '<span style="background:#FF3B30;color:#fff;padding:2px 8px;border-radius:20px;">阳离子</span>';
          dataSolubility.innerText = isLab ? '➡️ 向负极' : '🌊 布朗扩散';
          dataSolubility.style.color = COLOR_RED;
        } else {
          dataCharge.style.color = '#fff';
          dataState.innerHTML =
            '<span style="background:#000;color:#fff;padding:2px 8px;border-radius:20px;">阴离子</span>';
          dataSolubility.innerText = isLab ? '⬅️ 向正极' : '🌊 布朗扩散';
          dataSolubility.style.color = '#94a3b8';
        }

        animationId = requestAnimationFrame(animate);
      }

      phSlider.addEventListener('input', updateEnvironmentIons);
      piSlider.addEventListener('input', () => {});

      document.getElementById('btn-single').onclick = () => {
        if (isMulti) { isMulti = false;
          document.getElementById('btn-single').classList.add('active');
          document.getElementById('btn-multi').classList.remove('active');
          initSystem(); }
      };
      document.getElementById('btn-multi').onclick = () => {
        if (!isMulti) { isMulti = true;
          document.getElementById('btn-multi').classList.add('active');
          document.getElementById('btn-single').classList.remove('active');
          initSystem(); }
      };
      document.getElementById('btn-lab').onclick = () => {
        if (!isLab) { isLab = true;
          document.getElementById('btn-lab').classList.add('active');
          document.getElementById('btn-bio').classList.remove('active');
          initSystem(); }
      };
      document.getElementById('btn-bio').onclick = () => {
        if (isLab) { isLab = false;
          document.getElementById('btn-bio').classList.add('active');
          document.getElementById('btn-lab').classList.remove('active');
          initSystem(); }
      };

      window.addEventListener('resize', () => {
        if (animationId) cancelAnimationFrame(animationId);
        resizeCanvas();
        animationId = requestAnimationFrame(animate);
      });

      resizeCanvas();
      animationId = requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
